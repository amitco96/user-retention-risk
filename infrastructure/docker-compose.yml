services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: retention-app
    ports:
      - "8000:8000"
    env_file: ../.env
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/retention_dev
      - API_PIPELINE_SECRET=${API_PIPELINE_SECRET}

  postgres:
    image: postgres:16-alpine
    container_name: retention-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: retention_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
